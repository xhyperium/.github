# xhyperium Standard CI — P1 标准门禁
#
# 适用：L2.5 领域共享层 / 业务域模块 / library（decimalx, domainx, binance 等）
# Gate: gofmt → build → test → coverage → vet → lint → xlibgate trust
# 约束：self-hosted runner 必须已在 xhyperium org 注册
#
# ────────────────────────────────────────────
# 用法（模块仓库 `.github/workflows/ci.yml`）
# ────────────────────────────────────────────
#
#   基本用法（全部使用默认值）：
#
#     jobs:
#       ci:
#         uses: xhyperium/.github/.github/workflows/ci-standard.yml@main
#
#   自定义参数：
#
#     jobs:
#       ci:
#         uses: xhyperium/.github/.github/workflows/ci-standard.yml@main
#         with:
#           go_version: '1.26.5'        # Go 工具链版本
#           coverage_threshold: 60      # 全局覆盖率最低门禁（0–100）
#           runs_on: ubuntu-latest      # Runner 标签（生产须切换 self-hosted）
#           xlibgate_module: 'github.com/ZoneCNH/xlibgate/cmd/xlibgate@v1.0.2'
#
# ────────────────────────────────────────────
# 使用示例
# ────────────────────────────────────────────
#
#   ▸ L2.5 领域层模块（decimalx / domain_market）：
#
#     on:
#       push:  { branches: [main] }
#       pull_request:
#     jobs:
#       ci:
#         uses: xhyperium/.github/.github/workflows/ci-standard.yml@main
#
#   ▸ 业务域模块（binance / okx 等）：
#
#     on:
#       push:  { branches: [main] }
#       pull_request:
#         paths-ignore: ['**/*.md', 'docs/**']
#     concurrency:
#       group: ${{ github.workflow }}-${{ github.ref }}
#       cancel-in-progress: true
#     jobs:
#       ci:
#         uses: xhyperium/.github/.github/workflows/ci-standard.yml@main
#
#   ▸ Self-hosted runner（生产环境）：
#
#     jobs:
#       ci:
#         uses: xhyperium/.github/.github/workflows/ci-standard.yml@main
#         with:
#           runs_on: '["self-hosted", "Linux", "X64", "ci-go"]'
#
#   ▸ 固定版本引用：
#
#     jobs:
#       ci:
#         uses: xhyperium/.github/.github/workflows/ci-standard.yml@v1
#
# ────────────────────────────────────────────
# 输入参数
# ────────────────────────────────────────────
# go_version           Go 工具链版本号（semver）。字符串，默认 "1.26.5"。
#                      运行时通过 GOTOOLCHAIN=local 锁定此版本，不自动下载。
#
# coverage_threshold   全局代码覆盖率最低百分比（0–100）。数字，默认 60。
#                      低于此值 CI 失败。计算来源：go tool cover -func 的
#                      total 行。P1 标准门禁阈值低于 P0（60 vs 80）。
#
# runs_on              GitHub Actions runner 标签。字符串，默认 "ubuntu-latest"。
#                      ⚠ 生产环境必须切换为 self-hosted runner：
#                        - Standard P1:   [self-hosted, Linux, X64, ci-go]
#                      默认值仅用于初始接入验证，不得长期使用 GitHub-hosted。
#
# xlibgate_module      go install 模块路径@version。默认 ZoneCNH 历史路径。
# ────────────────────────────────────────────

name: CI — Standard (P1)

on:
  workflow_call:
    inputs:
      go_version:
        description: 'Go toolchain version (semver, e.g. 1.26.5)'
        type: string
        default: '1.26.5'
      coverage_threshold:
        description: 'Minimum global coverage percentage (0–100, default 60)'
        type: number
        default: 60
      runs_on:
        description: 'Runner label — production must use self-hosted, ubuntu-latest for onboarding only'
        type: string
        default: 'ubuntu-latest'
      xlibgate_module:
        description: 'go install path@version for xlibgate CLI'
        type: string
        default: 'github.com/ZoneCNH/xlibgate/cmd/xlibgate@v1.0.2'

permissions:
  contents: read

jobs:
  ci:
    name: Standard CI
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: 25
    env:
      GO_VERSION: ${{ inputs.go_version }}
      GOTOOLCHAIN: local
      CGO_ENABLED: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: go mod tidy (preflight)
        run: |
          set -euo pipefail
          if ! go mod tidy -diff; then
            echo "::error::go.mod or go.sum is out of sync — run 'go mod tidy'"
            exit 1
          fi

      - name: gofmt
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l . 2>/dev/null || true)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: go build
        run: go build ./...

      - name: go test (coverage)
        run: |
          set -euo pipefail
          go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage gate
        env:
          THRESHOLD: ${{ inputs.coverage_threshold }}
        run: |
          set -euo pipefail
          if [ ! -f coverage.out ]; then
            echo "::error::coverage.out not found"
            exit 1
          fi
          total=$(go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,"",$3); print $3}')
          if [ -z "${total}" ]; then
            echo "::error::Could not parse coverage total"
            exit 1
          fi
          echo "Coverage: ${total}% (threshold: ${THRESHOLD}%)"
          awk -v t="$total" -v th="$THRESHOLD" 'BEGIN {
            if (t+0 < th+0) {
              printf "::error::Coverage %s%% below threshold %s%%\n", t, th
              exit 1
            }
          }'

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: xlibgate — trust check
        run: |
          set -euo pipefail
          go install ${{ inputs.xlibgate_module }}
          xlibgate trust
