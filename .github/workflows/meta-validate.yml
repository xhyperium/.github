# 本仓元校验：workflow 双份同步、JSON/YAML 语法、setup 脚本 shellcheck
# 仅在 xhyperium/.github 自身运行，不是 reusable workflow。

name: Meta Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: meta-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: meta-validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Workflow dual-tree sync check
        run: bash scripts/sync-workflows.sh --check

      - name: Validate ruleset JSON
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, pathlib, sys
          root = pathlib.Path("rulesets")
          files = sorted(root.glob("*.json"))
          if not files:
              print("FAIL: no rulesets/*.json", file=sys.stderr)
              sys.exit(1)
          for p in files:
              json.load(p.open())
              print(f"OK {p}")
          PY

      - name: Validate workflow YAML
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import sys
          from pathlib import Path
          try:
              import yaml
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "PyYAML"])
              import yaml
          paths = list(Path("workflows").glob("*.yml")) + list(Path(".github/workflows").glob("*.yml"))
          for p in sorted(paths):
              list(yaml.safe_load_all(p.read_text()))
              print(f"OK {p}")
          PY

      - name: ShellCheck setup scripts
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -x \
            scripts/setup-global-rules.sh \
            scripts/sync-workflows.sh \
            scripts/apply-org-ruleset.sh \
            scripts/check-workspace-deps.sh

      - name: CodeQL config YAML
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          try:
              import yaml
          except ImportError:
              import subprocess, sys
              subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "PyYAML"])
              import yaml
          p = Path("codeql/codeql-config.yml")
          yaml.safe_load(p.read_text())
          print(f"OK {p}")
          PY

      - name: Rulesets markdown relative links
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re, sys
          from pathlib import Path
          root = Path("rulesets")
          pat = re.compile(r"\[([^\]]*)\]\(([^)]+)\)")
          broken = []
          for p in sorted(root.rglob("*.md")):
              text = p.read_text(encoding="utf-8")
              for m in pat.finditer(text):
                  url = m.group(2).split()[0].split("#")[0]
                  if not url or url.startswith(("http://", "https://", "mailto:")):
                      continue
                  target = (p.parent / url).resolve()
                  try:
                      target.relative_to(Path.cwd().resolve())
                  except ValueError:
                      # allow links that resolve outside rulesets but inside repo
                      pass
                  if not target.exists():
                      broken.append(f"{p}: {url}")
          if broken:
              print("FAIL broken relative links:", file=sys.stderr)
              for b in broken:
                  print(" ", b, file=sys.stderr)
              sys.exit(1)
          print(f"OK rulesets relative links ({sum(1 for _ in root.rglob('*.md'))} files)")
          PY

      - name: Rust specialty version headers align with RULES.md
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re, sys
          from pathlib import Path
          rules = Path("rulesets/rust/RULES.md").read_text(encoding="utf-8")
          m = re.search(r"\*\*版本\*\*：([0-9]+\.[0-9]+\.[0-9]+)", rules)
          if not m:
              print("FAIL: cannot parse RULES.md version", file=sys.stderr)
              sys.exit(1)
          expected = m.group(1)
          bad = []
          for p in sorted(Path("rulesets/rust").glob("*.md")):
              if p.name == "RULES.md":
                  continue
              text = p.read_text(encoding="utf-8")
              # accept "版本：x.y.z" or "版本 x.y.z"
              vm = re.search(r"版本[：: ]+([0-9]+\.[0-9]+\.[0-9]+)", text)
              if not vm:
                  continue  # cheatsheet may use different form; still check if present
              if vm.group(1) != expected:
                  bad.append(f"{p.name}: {vm.group(1)} != {expected}")
          if bad:
              print("FAIL rust specialty version drift:", file=sys.stderr)
              for b in bad:
                  print(" ", b, file=sys.stderr)
              sys.exit(1)
          print(f"OK rust specialty versions == {expected}")
          PY

      - name: org-rust-pr-quality safety defaults
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          p = Path("rulesets/org-rust-pr-quality.ruleset.json")
          d = json.loads(p.read_text())
          if d.get("enforcement") == "active":
              inc = d.get("conditions", {}).get("repository_name", {}).get("include") or []
              if "~ALL" in inc:
                  print("FAIL: org-rust-pr-quality must not use ~ALL while active", file=sys.stderr)
                  sys.exit(1)
          print(f"OK org-rust-pr-quality enforcement={d.get('enforcement')}")
          PY
