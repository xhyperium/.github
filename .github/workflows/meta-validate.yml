# 本仓元校验：workflow 双份同步、JSON/YAML 语法、setup 脚本 shellcheck
# 仅在 xhyperium/.github 自身运行，不是 reusable workflow。

name: Meta Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: meta-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: meta-validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Workflow dual-tree sync check
        run: bash scripts/sync-workflows.sh --check

      - name: Validate ruleset JSON
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, pathlib, sys
          root = pathlib.Path("rulesets")
          files = sorted(root.glob("*.json"))
          if not files:
              print("FAIL: no rulesets/*.json", file=sys.stderr)
              sys.exit(1)
          for p in files:
              json.load(p.open())
              print(f"OK {p}")
          PY

      - name: Validate workflow YAML
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import sys
          from pathlib import Path
          try:
              import yaml
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "PyYAML"])
              import yaml
          paths = list(Path("workflows").glob("*.yml")) + list(Path(".github/workflows").glob("*.yml"))
          for p in sorted(paths):
              list(yaml.safe_load_all(p.read_text()))
              print(f"OK {p}")
          PY

      - name: ShellCheck setup scripts
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -x scripts/setup-global-rules.sh scripts/sync-workflows.sh

      - name: CodeQL config YAML
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          try:
              import yaml
          except ImportError:
              import subprocess, sys
              subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "PyYAML"])
              import yaml
          p = Path("codeql/codeql-config.yml")
          yaml.safe_load(p.read_text())
          print(f"OK {p}")
          PY
